# realm.yaml — configuration for a realm container runtime instance
# This file defines the identity, network presence, and capabilities of your realm.

realm:
  # Unique identifier on the realmnet ledger
  id: newrock.realmnet

  # Human-readable name
  name: Newrock

  # Runtime mode: private (local only) or public (registered on realmnet)
  mode: public  # change to 'public' to join the realmnet ledger

  # Path to your realm keypair (generated with: realm keygen)
  keyfile: ./keys/newrock.realmnet.pem

# Network configuration
network:
  # Port this realm listens on for incoming inter-realm requests
  port: 8080

  # Public endpoint — required if mode is 'public'
  endpoint: http://localhost:8080

  # realmnet bootstrap peers — used to sync the ledger and announce presence
  bootstrap:
    - localhost:7946

# Capabilities — HTTP tool endpoints this realm exposes
capabilities:
  enabled: true
  basePath: /capabilities


# Observability
observability:
  logLevel: info  # debug, info, warn, error
